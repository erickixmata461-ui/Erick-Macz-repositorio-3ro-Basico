<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        /* ESTILO GENERAL DE LA PÁGINA */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #16a34a); /* Fondo degradado verde oscuro */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CAJA CONTENEDORA DEL REGISTRO */
        .registro-contenedor {
            width: 380px;
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .registro-contenedor h1 {
            margin-bottom: 10px;
            color: #15803d;
        }

        .registro-contenedor p {
            color: #555;
            margin-bottom: 25px;
        }

        /* CAMPOS DE ENTRADA (DIVS) */
        .campo {
            text-align: left;
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        .campo input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .campo input:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 5px rgba(22, 163, 74, 0.4);
        }

        /* SECCIÓN DE TÉRMINOS Y CONDICIONES */
        .terminos {
            text-align: left;
            font-size: 14px;
            margin-bottom: 20px;
            color: #444;
        }

        .terminos input[type="checkbox"] {
            width: auto;
            margin-right: 6px;
            vertical-align: middle;
        }

        .terminos a {
            color: #16a34a;
            text-decoration: none;
            font-weight: bold;
        }

        .terminos a:hover {
            text-decoration: underline;
        }

        /* BOTÓN DE ENVIAR */
        button {
            width: 100%;
            background-color: #15803d;
            color: white;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #166534;
        }

        /* ENLACE PARA VOLVER AL LOGIN */
        .login {
            margin-top: 20px;
            font-size: 14px;
        }

        .login a {
            color: #16a34a;
            font-weight: bold;
            text-decoration: none;
        }

        .login a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- CAJA PRINCIPAL -->
    <div class="registro-contenedor">
        <h1>Crear Cuenta</h1>
        <p>Completa tus datos para registrarte</p>

        <!-- FORMULARIO -->
        <form>
            <!-- CAMPO: NOMBRE -->
            <div class="campo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Escribe tu nombre completo">
            </div>

            <!-- CAMPO: CORREO -->
            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com">
            </div>

            <!-- CAMPO: USUARIO -->
            <div class="campo">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Crea un nombre de usuario">
            </div>

            <!-- CAMPO: CONTRASEÑA -->
            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Crea una contraseña">
            </div>

            <!-- CAMPO: CONFIRMAR CONTRASEÑA -->
            <div class="campo">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" placeholder="Repite tu contraseña">
            </div>

            <!-- CASILLA TÉRMINOS -->
            <div class="terminos">
                <label>
                    <input type="checkbox">
                    Acepto los <a href="#">términos y condiciones</a>
                </label>
            </div>

            <!-- BOTÓN REGISTRAR -->
            <button type="submit">Registrarme</button>
        </form>

        <!-- INICIAR SESIÓN -->
        <div class="login">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
        </div>
    </div>

</body>
</html>
