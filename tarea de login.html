<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login básico</title>
    <style>
        /* ESTILO GENERAL DE LA PÁGINA */
        body {
            background-color: #f0f2f5; 
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* CAJA DEL LOGIN */
        .caja-login {
            background-color: white;
            width: 300px;
            margin: 100px auto;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }

        /* CAMPOS DE TEXTO */
        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #007bff; /* Se pinta azul al hacer clic, estilo Google */
        }

        /* CONTENEDOR ESPECIAL PARA LA CONTRASEÑA */
        .contenedor-password {
            position: relative;
            width: 90%;
            margin: 8px auto;
        }

        .contenedor-password input {
            width: 100%;
            margin: 0;
            padding-right: 40px; /* Espacio para que el texto no tape el ojo */
        }

        /* BOTÓN DEL OJO DISCRETO (Estilo Google) */
        .btn-ojo {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Color del ojo gris suave */
        .btn-ojo svg {
            width: 20px;
            height: 20px;
            fill: #5f6368; 
        }

        .btn-ojo:hover svg {
            fill: #202124; /* Se oscurece un poco al pasar el mouse */
        }

        /* BOTÓN PRINCIPAL INGRESAR */
        button#btn-ingresar {
            background-color: #007bff;
            color: white;
            padding: 10px;
            width: 90%;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        button#btn-ingresar:hover {
            background-color: #0056b3;
        }

        /* MENSAJE */
        #mensaje {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <!-- TÍTULO PRINCIPAL -->
    <h1>Login de Don Camarón</h1>

    <!-- CAJA PRINCIPAL -->
    <div class="caja-login">
        <h2>Iniciar sesión</h2>
        
        <!-- CAMPO USUARIO -->
        <input type="text" id="usuario" placeholder="Escribe tu usuario">
        <br>

        <!-- CAMPO CONTRASEÑA CON OJO VECTORIAL -->
        <div class="contenedor-password">
            <input type="password" id="contrasena" placeholder="Escribe tu contraseña">
            <button type="button" class="btn-ojo" onclick="alternarPassword()" id="icono-ojo">
                <!-- Icono de ojo tachado por defecto (oculto) -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                </svg>
            </button>
        </div>
        <br>

        <!-- BOTÓN -->
        <button id="btn-ingresar" onclick="validarLogin()">Ingresar</button>

        <!-- MENSAJE -->
        <p id="mensaje"></p>
    </div>

    <script>
        // FUNCIÓN PARA MOSTRAR / OCULTAR CONTRASEÑA Y CAMBIAR ICONO
        function alternarPassword() {
            let inputContrasena = document.getElementById("contrasena");
            let botonOjo = document.getElementById("icono-ojo");
            
            // Vectores de los ojos estilo Google (Abierto y Cerrado)
            let ojoAbierto = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
            let ojoCerrado = `<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>`;

            if (inputContrasena.type === "password") {
                inputContrasena.type = "text";
                botonOjo.innerHTML = ojoAbierto; // Cambia al ojo normal
            } else {
                inputContrasena.type = "password";
                botonOjo.innerHTML = ojoCerrado; // Vuelve al ojo tachado
            }
        }

        // FUNCIÓN VALIDAR LOGIN
        function validarLogin() {
            let usuario = document.getElementById("usuario").value;
            let contrasena = document.getElementById("contrasena").value;

            let usuarioCorrecto = "ventas_camaron";
            let contrasenaCorrecta = "camaron2026";

            if (usuario === usuarioCorrecto && contrasena === contrasenaCorrecta) {
                document.getElementById("mensaje").innerHTML = "Usuario correcto";
                document.getElementById("mensaje").style.color = "green";
            } else {
                document.getElementById("mensaje").innerHTML = "Vuelve a intentar";
                document.getElementById("mensaje").style.color = "red";
            }
        }
    </script>

</body>
</html>
